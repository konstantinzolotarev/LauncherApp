name: LauncherApp
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  bundleIdPrefix: com.launcher

packages:
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.1

targets:
  LauncherApp:
    type: application
    platform: macOS
    sources:
      - LauncherApp
    settings:
      base:
        INFOPLIST_FILE: LauncherApp/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: LauncherApp/LauncherApp.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.launcher.LauncherApp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        SWIFT_VERSION: "5.10"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - package: HotKey
